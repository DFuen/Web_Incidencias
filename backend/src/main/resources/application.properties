spring.application.name=backend

# Railway / Local
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/incidencias?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Incidenci@s18042026}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP settings (ajustar según las necesidades de tu aplicación y la base de datos)
spring.datasource.hikari.max-lifetime=30000
spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.keepalive-time=15000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000

# Configuración de zona horaria
spring.jackson.time-zone=Europe/Madrid
spring.jpa.properties.hibernate.jdbc.time_zone=Europe/Madrid

# Configuración de Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

logging.level.org.hibernate=warn
logging.level.org.hibernate.SQL=warn
logging.level.org.hibernate.orm.jdbc.bind=warn
logging.level.org.hibernate.orm.jpa=warn
logging.level.org.springframework.orm.jpa=warn
logging.level.com.zaxxer.hikari=warn
logging.level.org.springframework.web=warn
logging.level.org.springframework.security=warn
logging.level.org.apache.catalina=warn

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Railway necesita usar el puerto dinámico
server.port=${PORT:8080}
